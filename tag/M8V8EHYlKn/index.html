<script>
  var message_Path = 'https://cdn.jsdelivr.net/gh/hsxyhao/live2d.github.io@master/';
  let landlord = document.querySelector('#landlord');
  var apiKey = landlord.dataset.key;

<script type="text/javascript" src="/media/live2d/js/live2d.js"></script>
<script>
	var home_Path = document.location.protocol + '//' + window.document.location.hostname + ":" + window.document.location.port + '/';
	var userAgent = window.navigator.userAgent.toLowerCase();
	var norunAI = ["android", "iphone", "ipod", "ipad", "windows phone", "mqqbrowser", "msie", "trident/7.0"];
	var norunFlag = false;

	for (var i = 0; i < norunAI.length; i++) {
		if (userAgent.indexOf(norunAI[i]) > -1) {
			norunFlag = true;
			break;
		}
	}

	if (!window.WebGLRenderingContext) {
		norunFlag = true;
	}

	if (!norunFlag) {
		var hitFlag = false;
		var AIFadeFlag = false;
		var liveTlakTimer = null;
		var sleepTimer_ = null;
		var AITalkFlag = false;
		var talkNum = 0;
		(function () {
			function renderTip(template, context) {
				var tokenReg = /(\\)?\{([^\{\}\\]+)(\\)?\}/g;
				return template.replace(tokenReg, function (word, slash1, token, slash2) {
					if (slash1 || slash2) {
						return word.replace('\\', '');
					}
					var variables = token.replace(/\s/g, '').split('.');
					var currentObject = context;
					var i, length, variable;
					for (i = 0, length = variables.length; i < length; ++i) {
						variable = variables[i];
						currentObject = currentObject[variable];
						if (currentObject === undefined || currentObject === null) return '';
					}
					return currentObject;
				});
			}

			String.prototype.renderTip = function (context) {
				return renderTip(this, context);
			};

			var re = /x/;
			re.toString = function () {
				showMessage('哈哈，你打开了控制台，是想要看看我的秘密吗？', 5000);
				return '';
			};

			$(document).on('copy', function () {
				showMessage('你都复制了些什么呀，转载要记得加上出处哦~~', 5000);
			});

			function initTips() {
				$.ajax({
					cache: true,
					url: message_Path + 'message.json',
					dataType: "json",
					success: function (result) {
						$.each(result.mouseover, function (index, tips) {
							$(tips.selector).mouseover(function () {
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
								talkValTimer();
								clearInterval(liveTlakTimer);
								liveTlakTimer = null;
							});
							$(tips.selector).mouseout(function () {
								showHitokoto();
								if (liveTlakTimer == null) {
									liveTlakTimer = window.setInterval(function () {
										showHitokoto();
									}, 15000);
								};
							});
						});
						$.each(result.click, function (index, tips) {
							$(tips.selector).click(function () {
								if (hitFlag) {
									return false
								}
								hitFlag = true;
								setTimeout(function () {
									hitFlag = false;
								}, 8000);
								var text = tips.text;
								if (Array.isArray(tips.text)) text = tips.text[Math.floor(Math.random() * tips.text.length + 1) - 1];
								text = text.renderTip({ text: $(this).text() });
								showMessage(text, 3000);
							});
							clearInterval(liveTlakTimer);
							liveTlakTimer = null;
							if (liveTlakTimer == null) {
								liveTlakTimer = window.setInterval(function () {
									showHitokoto();
								}, 15000);
							};
						});
					}
				});
			}
			initTips();

			var text;
			if (document.referrer !== '') {
				var referrer = document.createElement('a');
				referrer.href = document.referrer;
				text = '嗨！来自 <span style="color:#0099cc;">' + referrer.hostname + '</span> 的朋友！';
				var domain = referrer.hostname.split('.')[1];
				if (domain == 'baidu') {
					text = '嗨！ 来自 百度搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'so') {
					text = '嗨！ 来自 360搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				} else if (domain == 'google') {
					text = '嗨！ 来自 谷歌搜索 的朋友！<br>欢迎访问<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			} else {
				if (window.location.href == home_Path) { //主页URL判断，需要斜杠结尾
					var now = (new Date()).getHours();
					if (now > 23 || now <= 5) {
						text = '你是夜猫子呀？这么晚还不睡觉，明天起的来嘛？';
					} else if (now > 5 && now <= 7) {
						text = '早上好！一日之计在于晨，美好的一天就要开始了！';
					} else if (now > 7 && now <= 11) {
						text = '上午好！工作顺利嘛，不要久坐，多起来走动走动哦！';
					} else if (now > 11 && now <= 14) {
						text = '中午了，工作了一个上午，现在是午餐时间！';
					} else if (now > 14 && now <= 17) {
						text = '午后很容易犯困呢，今天的运动目标完成了吗？';
					} else if (now > 17 && now <= 19) {
						text = '傍晚了！窗外夕阳的景色很美丽呢，最美不过夕阳红~~';
					} else if (now > 19 && now <= 21) {
						text = '晚上好，今天过得怎么样？';
					} else if (now > 21 && now <= 23) {
						text = '已经这么晚了呀，早点休息吧，晚安~~';
					} else {
						text = '嗨~ 快来逗我玩吧！';
					}
				} else {
					text = '欢迎阅读<span style="color:#0099cc;">「 ' + document.title.split(' - ')[0] + ' 」</span>';
				}
			}
			showMessage(text, 12000);
		})();

		liveTlakTimer = setInterval(function () {
			showHitokoto();
		}, 15000);

		function showHitokoto() {
			if (sessionStorage.getItem("Sleepy") !== "1") {
				if (!AITalkFlag) {
					$.getJSON('https://v1.hitokoto.cn/', function (result) {
						talkValTimer();
						showMessage(result.hitokoto, 0);
					});
				}
			} else {
				hideMessage(0);
				if (sleepTimer_ == null) {
					sleepTimer_ = setInterval(function () {
						checkSleep();
					}, 200);
				}
			}
		}

		function checkSleep() {
			var sleepStatu = sessionStorage.getItem("Sleepy");
			if (sleepStatu !== '1') {
				talkValTimer();
				showMessage('你回来啦~', 0);
				clearInterval(sleepTimer_);
				sleepTimer_ = null;
			}
		}

		function showMessage(text, timeout) {
			if (Array.isArray(text)) text = text[Math.floor(Math.random() * text.length + 1) - 1];
			$('.message').stop();
			$('.message').html(text);
			$('.message').fadeTo(200, 1);
			//if (timeout === null) timeout = 5000;
			//hideMessage(timeout);
		}
		function talkValTimer() {
			$('#live_talk').val('1');
		}

		function hideMessage(timeout) {
			//$('.message').stop().css('opacity',1);
			if (timeout === null) timeout = 5000;
			$('.message').delay(timeout).fadeTo(200, 0);
		}

		function initLive2d() {
			$('#hideButton').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "0");
					$('#landlord').fadeOut(200);
					$('#open_live2d').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#open_live2d').on('click', function () {
				if (AIFadeFlag) {
					return false;
				} else {
					AIFadeFlag = true;
					localStorage.setItem("live2dhidden", "1");
					$('#open_live2d').fadeOut(200);
					$('#landlord').delay(200).fadeIn(200);
					setTimeout(function () {
						AIFadeFlag = false;
					}, 300);
				}
			});
			$('#youduButton').on('click', function () {
				if ($('#youduButton').hasClass('doudong')) {
					var typeIs = $('#youduButton').attr('data-type');
					$('#youduButton').removeClass('doudong');
					$('body').removeClass(typeIs);
					$('#youduButton').attr('data-type', '');
				} else {
					var duType = $('#duType').val();
					var duArr = duType.split(",");
					var dataType = duArr[Math.floor(Math.random() * duArr.length)];

					$('#youduButton').addClass('doudong');
					$('#youduButton').attr('data-type', dataType);
					$('body').addClass(dataType);
				}
			});
			if (apiKey) {
				$('#showInfoBtn').on('click', function () {
					var live_statu = $('#live_statu_val').val();
					if (live_statu == "0") {
						return
					} else {
						$('#live_statu_val').val("0");
						$('.live_talk_input_body').fadeOut(500);
						AITalkFlag = false;
						showHitokoto();
						$('#showTalkBtn').show();
						$('#showInfoBtn').hide();
					}
				});
				$('#showTalkBtn').on('click', function () {
					var live_statu = $('#live_statu_val').val();
					if (live_statu == "1") {
						return
					} else {
						$('#live_statu_val').val("1");
						$('.live_talk_input_body').fadeIn(500);
						AITalkFlag = true;
						$('#showTalkBtn').hide();
						$('#showInfoBtn').show();

					}
				});
				$('#talk_send').on('click', function () {
					var info_ = $('#AIuserText').val();
					var userid_ = $('#AIuserName').val();
					if (info_ == "") {
						showMessage('写点什么吧！', 0);
						return;
					}
					if (userid_ == "") {
						showMessage('聊之前请告诉我你的名字吧！', 0);
						return;
					}
					showMessage('思考中~', 0);
					let protocol = window.location.protocol.indexOf("s") > 0 ? "https" : "http";
					$.ajax({
						type: "get",
						url: `${protocol}://www.tuling123.com/openapi/api?key=${apiKey}&info=${info_}`,
						dataType: "json",
						success: function (res) {
							talkValTimer();
							showMessage(res.text, 0);
							$('#AIuserText').val("");
							sessionStorage.setItem("live2duser", userid_);
						},
						error: function (e) {
							talkValTimer();
							showMessage('似乎有什么错误，请和站长联系！', 0);
						}
					});
				});
			} else {
				$('#showInfoBtn').hide();
				$('#showTalkBtn').hide();
			}
			//获取音乐信息初始化
			var bgmListInfo = $('input[name=live2dBGM]');
			if (bgmListInfo.length == 0) {
				$('#musicButton').hide();
			} else {
				var bgmPlayNow = parseInt($('#live2d_bgm').attr('data-bgm'));
				var bgmPlayTime = 0;
				var live2dBGM_Num = sessionStorage.getItem("live2dBGM_Num");
				var live2dBGM_PlayTime = sessionStorage.getItem("live2dBGM_PlayTime");
				if (live2dBGM_Num) {
					if (live2dBGM_Num <= $('input[name=live2dBGM]').length - 1) {
						bgmPlayNow = parseInt(live2dBGM_Num);
					}
				}
				if (live2dBGM_PlayTime) {
					bgmPlayTime = parseInt(live2dBGM_PlayTime);
				}
				var live2dBGMSrc = bgmListInfo.eq(bgmPlayNow).val();
				$('#live2d_bgm').attr('data-bgm', bgmPlayNow);

<script>

  let sideBarOpen = 'sidebar-open';
  let body = document.body;
  let back2Top = document.querySelector('#back_to_top'),
  back2TopText = document.querySelector('#back_to_top_text'),
  drawerBox = document.querySelector('#drawer_box'),
  rightSideBar = document.querySelector('.sidebar'),
  viewport = document.querySelector('body');

  function scrollAnimation(currentY, targetY) {
   
    let needScrollTop = targetY - currentY
    let _currentY = currentY
    setTimeout(() => {
      const dist = Math.ceil(needScrollTop / 10)
      _currentY += dist
      window.scrollTo(_currentY, currentY)
      if (needScrollTop > 10 || needScrollTop < -10) {
        scrollAnimation(_currentY, targetY)
      } else {
        window.scrollTo(_currentY, targetY)
      }
    }, 1)
  }

  back2Top.addEventListener("click", function(e) {
    scrollAnimation(document.scrollingElement.scrollTop, 0);
    e.stopPropagation();
    return false;
  });
  
  window.addEventListener('scroll', function(e) {
    let percent = document.scrollingElement.scrollTop / (document.scrollingElement.scrollHeight - document.scrollingElement.clientHeight) * 100;
    if (percent > 1 && !back2Top.classList.contains('back-top-active')) {
      back2Top.classList.add('back-top-active');
    }
    if (percent == 0) {
      back2Top.classList.remove('back-top-active');
    }
    if (back2TopText) {
      back2TopText.textContent = Math.floor(percent);
    }
  });

  
  let hasCacu = false;
  window.onresize = function() {
    if (window.width > 991) {
      calcuHeight();
    } else {
      hasCacu = false;
    }
  }

  function calcuHeight() {
    // 动态调整站点概览高度
    if (!hasCacu && back2Top.classList.contains('pisces') || back2Top.classList.contains('gemini')) {
      let sideBar = document.querySelector('.sidebar');
      let navUl = document.querySelector('#site_nav');
      sideBar.style = 'margin-top:' + (navUl.offsetHeight + navUl.offsetTop + 15) + 'px;';
      hasCacu = true;
    }
  }
  calcuHeight();
  
  let open = false, MOTION_TIME = 300, RIGHT_MOVE_DIS = '320px';

  if (drawerBox) {
    let rightMotions = document.querySelectorAll('.right-motion');
    let right = drawerBox.classList.contains('right');

    let transitionDir = right ? "transition.slideRightIn" : "transition.slideLeftIn";

    let openProp, closeProp;
    if (right) {
      openProp = {
        paddingRight: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingRight: '0px'
      };
    } else {
      openProp = {
        paddingLeft: RIGHT_MOVE_DIS 
      };
      closeProp = {
        paddingLeft: '0px'
      };
    }

    drawerBox.onclick = function() {
      open = !open;
      window.Velocity(rightSideBar, 'stop');
      window.Velocity(viewport, 'stop');
      window.Velocity(rightMotions, 'stop');
      if (open) {
        window.Velocity(rightSideBar, {
          width: RIGHT_MOVE_DIS
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, transitionDir,{ });
          }
        })
        window.Velocity(viewport, openProp,{
          duration: MOTION_TIME
        });
      } else {
        window.Velocity(rightSideBar, {
          width: '0px'
        }, {
          duration: MOTION_TIME,
          begin: function() {
            window.Velocity(rightMotions, {
              opacity: 0
            });
          }
        })
        window.Velocity(viewport, closeProp ,{
          duration: MOTION_TIME
        });
      }
      for (let i = 0; i < drawerBox.children.length; i++) {
        drawerBox.children[i].classList.toggle('muse-line');
      }
      drawerBox.classList.toggle(sideBarOpen);
    }
  }

  // 链接跳转

      if (!item.classList.contains('btn')) {
        item.setAttribute("target","_blank");
      }
    })

  hljs.initHighlightingOnLoad();

<script>
  //拿来主义(真香)^_^，Clipboard 实现摘自掘金 https://juejin.im/post/5aefeb6e6fb9a07aa43c20af
  window.Clipboard = (function (window, document, navigator) {
    var textArea,
      copy;

    // 判断是不是ios端
    function isOS() {
      return navigator.userAgent.match(/ipad|iphone/i);
    }
    //创建文本元素
    function createTextArea(text) {
      textArea = document.createElement('textArea');
      textArea.value = text;
      textArea.style.width = 0;
      textArea.style.height = 0;
      textArea.clientHeight = 0;
      textArea.clientWidth = 0;
      document.body.appendChild(textArea);
    }
    //选择内容
    function selectText() {
      var range,
        selection;

      if (isOS()) {
        range = document.createRange();
        range.selectNodeContents(textArea);
        selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);
        textArea.setSelectionRange(0, 999999);
      } else {
        textArea.select();
      }
    }

    //复制到剪贴板
    function copyToClipboard() {
      try {
        document.execCommand("Copy")
      } catch (err) {
        alert("复制错误！请手动复制！")
      }
      document.body.removeChild(textArea);
    }

    copy = function (text) {
      createTextArea(text);
      selectText();
      copyToClipboard();
    };

    return {
      copy: copy
    };
  })(window, document, navigator);

  function copyCode(e) {
    if (e.srcElement.tagName === 'SPAN' && e.srcElement.classList.contains('copy-code')) {
      let code = e.currentTarget.querySelector('code');
      var text = code.innerText;
      if (e.srcElement.textContent === '复制成功') {
        console.log('复制操作频率过高');
        return;
      }
      e.srcElement.textContent = '复制成功';
      (function (elem) {
        setTimeout(() => {
          if (elem.textContent === '复制成功') {
            elem.textContent = '复制代码'
          }
        }, 1000);
      })(e.srcElement)
      Clipboard.copy(text);
    }
  }

  let pres = document.querySelectorAll('pre');
  pres.forEach(pre => {
    let code = pre.querySelector('code');
    let copyElem = document.createElement('span');
    copyElem.classList.add('copy-code');
    copyElem.textContent = '复制代码';
    pre.appendChild(copyElem);
    pre.onclick = copyCode
  })
</script>

&lt;p&gt;在以上服务发现的软件中，Euerka 和 Consul 使用最为广泛。但由于eureka已经停止更新，所以这里选用consul。&lt;/p&gt;
&lt;h2 id=&#34;二-consul介绍&#34;&gt;二、Consul介绍&lt;/h2&gt;
&lt;p&gt;Consul 是 HashiCorp 公司推出的开源工具，用于实现分布式系统的服务发现与配置。与其它分布式服务注册与发现的方案，Consul 的方案更“一站式”，内置了服务注册与发现框 架、分布一致性协议实现、健康检查、Key/Value 存储、多数据中心方案，不再需要依赖其它工具（比如 ZooKeeper 等）。使用起来也较 为简单。Consul 使用 Go 语言编写，因此具有天然可移植性(支持Linux、windows和Mac OS X)；安装包仅包含一个可执行文件，方便部署，与 Docker 等轻量级容器可无缝配合。&lt;/p&gt;
&lt;h3 id=&#34;21-consul优势&#34;&gt;2.1 consul优势&lt;/h3&gt;
&lt;p&gt;1、使用 Raft 算法来保证一致性, 比复杂的 Paxos 算法更直接. 相比较而言, zookeeper 采用的是 Paxos, 而 etcd 使用的则是 Raft。&lt;br&gt;
2、支持多数据中心，内外网的服务采用不同的端口进行监听。 多数据中心集群可以避免单数据中心的单点故障,而其部署则需要考虑网络延迟, 分片等情况等。 zookeeper 和 etcd 均不提供多数据中心功能的支持。&lt;br&gt;
3、支持健康检查。 etcd 不提供此功能。&lt;br&gt;
4、支持 http 和 dns 协议接口。 zookeeper 的集成较为复杂, etcd 只支持 http 协议。&lt;br&gt;
5、官方提供 web 管理界面, etcd 无此功能。&lt;br&gt;
6、综合比较, Consul 作为服务注册和配置管理的新星, 比较值得关注和研究。&lt;/p&gt;
&lt;h3 id=&#34;22-consul角色&#34;&gt;2.2 Consul角色&lt;/h3&gt;
&lt;p&gt;1、client: 客户端, 无状态, 将 HTTP 和 DNS 接口请求转发给局域网内的服务端集群。&lt;br&gt;
2、server: 服务端, 保存配置信息, 高可用集群, 在局域网内与本地客户端通讯, 通过广域网与其它数据中心通讯。 每个数据中心的 server 数量推荐为 3 个或是 5 个。&lt;/p&gt;
&lt;p&gt;Consul 客户端、服务端还支持夸中心的使用，更加提高了它的高可用性。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;2&#34;&gt;&lt;img src=&#34;https://imgs.cxlsky.com/image1560846818889.jpg&#34; alt=&#34;consul.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;h3 id=&#34;23-consul工作原理&#34;&gt;2.3 Consul工作原理&lt;/h3&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;3&#34;&gt;&lt;img src=&#34;https://imgs.cxlsky.com/image1560846871580.jpg&#34; alt=&#34;consul1.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;1、当 Producer 启动的时候，会向 Consul 发送一个 post 请求，告诉 Consul 自己的 IP 和 Port&lt;br&gt;
2、Consul 接收到 Producer 的注册后，每隔10s（默认）会向 Producer 发送一个健康检查的请求，检验Producer是否健康&lt;br&gt;
3、当 Consumer 发送 GET 方式请求 /api/address 到 Producer 时，会先从 Consul 中拿到一个存储服务 IP 和 Port 的临时表，从表中拿到 Producer 的 IP 和 Port 后再发送 GET 方式请求 /api/address&lt;br&gt;
4、该临时表每隔10s会更新，只包含有通过了健康检查的 Producer&lt;/p&gt;
&lt;p&gt;Spring Cloud Consul 项目是针对 Consul 的服务治理实现。Consul 是一个分布式高可用的系统，它包含多个组件，但是作为一个整体，在微服务架构中为我们的基础设施提供服务发现和服务配置的工具。&lt;/p&gt;
&lt;h2 id=&#34;三-springcloud项目整合consul&#34;&gt;三、SpringCloud项目整合Consul&lt;/h2&gt;
&lt;h3 id=&#34;31-准备工作&#34;&gt;3.1 准备工作&lt;/h3&gt;
&lt;p&gt;在之前的父工程项目中，新建一个子模块service-a，引入以下主要依赖：(其他依赖可自行添加)&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;&amp;lt;dependency&amp;gt;
		&amp;lt;groupId&amp;gt;org.springframework.boot&amp;lt;/groupId&amp;gt;
		&amp;lt;artifactId&amp;gt;spring-boot-starter-actuator&amp;lt;/artifactId&amp;gt;
	&amp;lt;/dependency&amp;gt;
	&amp;lt;dependency&amp;gt;
		&amp;lt;groupId&amp;gt;org.springframework.cloud&amp;lt;/groupId&amp;gt;
		&amp;lt;artifactId&amp;gt;spring-cloud-starter-consul-discovery&amp;lt;/artifactId&amp;gt;
	&amp;lt;/dependency&amp;gt;
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;其中spring-boot-starter-actuator依赖用户健康检查，如果不加这个依赖，可以自定义健康检查。&lt;br&gt;
其中spring-cloud-starter-consul-discovery是consul的依赖。&lt;/p&gt;
&lt;h3 id=&#34;32-修改配置文件&#34;&gt;3.2 修改配置文件&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-yaml&#34;&gt;#连接注册中心
spring:
  cloud:
    consul:
      #注册中心的地址，使用${}的形式，如果冒号前面的值为空，则取后面的值。
      host: ${DS_SERVER:192.168.132.131} 
      port: 8500
      discovery:
        instance-id: ${spring.application.name}-${random.uuid}

#此配置用于健康检查
management:
  endpoints:
    web:
      exposure:
        include: &amp;quot;*&amp;quot;
  endpoint:
    health:
      show-details: always
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;33-修改springboot入口类增加注解enablediscoveryclient&#34;&gt;3.3 修改springboot入口类，增加注解&lt;code&gt;@EnableDiscoveryClient&lt;/code&gt;&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-java&#34;&gt;@EnableDiscoveryClient
@SpringBootApplication(scanBasePackages = &amp;quot;com.cxlsky&amp;quot;)
@EnableFeignClients(basePackages={&amp;quot;com.cxlsky&amp;quot;})
public class EurekaClientAApplication {

    public static void main(String[] args) {
        SpringApplication.run(EurekaClientAApplication.class, args);
    }

}
&lt;/code&gt;&lt;/pre&gt;
&lt;p&gt;这样我们spring项目就改造完成了。&lt;/p&gt;
&lt;h2 id=&#34;四-consul服务端的安装&#34;&gt;四、Consul服务端的安装&lt;/h2&gt;
&lt;h3 id=&#34;41-这里使用docker安装单节点consul&#34;&gt;4.1 这里使用docker安装单节点consul：&lt;/h3&gt;
&lt;pre&gt;&lt;code class=&#34;language-bash&#34;&gt;## 1、搜索镜像
docker search consul
## 2、拉取镜像
docker pull consul
## 3、运行镜像
docker run -d -p 18500:8500 --name consul-server consul agent -server -bootstrap -client 0.0.0.0 -ui
## 4、查看运行日志
docker logs -f  consul-server
&lt;/code&gt;&lt;/pre&gt;
&lt;h3 id=&#34;42-查看web页面&#34;&gt;4.2 查看web页面&lt;/h3&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;4&#34;&gt;&lt;img src=&#34;https://imgs.cxlsky.com/image1560850783917.jpg&#34; alt=&#34;consulweb.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;可以看到现在只有consul自己一个服务注册上去了，下面我们启动我们的项目。&lt;/p&gt;
&lt;figure data-type=&#34;image&#34; tabindex=&#34;5&#34;&gt;&lt;img src=&#34;https://imgs.cxlsky.com/image1560851191684.jpg&#34; alt=&#34;consulclient.jpg&#34; loading=&#34;lazy&#34;&gt;&lt;/figure&gt;
&lt;p&gt;可以看到上面多出了我们的服务，这样就完成了服务发现。&lt;/p&gt;
&lt;blockquote&gt;
&lt;p&gt;由于注册中心的重要性，我们需要做高可用，所以需要集群部署。后续的章节中我会讲解以下docker swarm，并且使用docker swarm快速完成consul的集群部署。&lt;/p&gt;

          &lt;h2 id=&#34;一-mybatis-configxml配置&#34;&gt;一、mybatis-config.xml配置&lt;/h2&gt;
&lt;p&gt;由于开发新项目，需要对mybatis做配置，这些配置可以放在系统的yml文件里，也可以单独放在一个xml文件里，本示例放到了单独文件，如下所示：&lt;/p&gt;
&lt;pre&gt;&lt;code class=&#34;language-xml&#34;&gt;&amp;lt;?xml version=&amp;quot;1.0&amp;quot; encoding=&amp;quot;UTF-8&amp;quot;?&amp;gt;
&amp;lt;!DOCTYPE configuration PUBLIC &amp;quot;-//mybatis.org//DTD Config 3.0//EN&amp;quot; &amp;quot;http://mybatis.org/dtd/mybatis-3-config.dtd&amp;quot;&amp;gt;
&amp;lt;configuration&amp;gt;

	&amp;lt;!-- 全局参数 --&amp;gt;
	&amp;lt;settings&amp;gt;
		&amp;lt;!-- 使全局的映射器启用或禁用缓存。 --&amp;gt;
		&amp;lt;setting name=&amp;quot;cacheEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 全局启用或禁用延迟加载。当禁用时，所有关联对象都会即时加载。 --&amp;gt;
		&amp;lt;setting name=&amp;quot;lazyLoadingEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 当启用时，有延迟加载属性的对象在被调用时将会完全加载任意属性。否则，每种属性将会按需要加载。 --&amp;gt;
		&amp;lt;setting name=&amp;quot;aggressiveLazyLoading&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 是否允许单条sql 返回多个数据集 (取决于驱动的兼容性) default:true --&amp;gt;
		&amp;lt;setting name=&amp;quot;multipleResultSetsEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 是否可以使用列的别名 (取决于驱动的兼容性) default:true --&amp;gt;
		&amp;lt;setting name=&amp;quot;useColumnLabel&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 允许JDBC 生成主键。需要驱动器支持。如果设为了true，这个设置将强制使用被生成的主键，有一些驱动器不兼容不过仍然可以执行。 default:false --&amp;gt;
		&amp;lt;setting name=&amp;quot;useGeneratedKeys&amp;quot; value=&amp;quot;false&amp;quot; /&amp;gt;

		&amp;lt;!-- 指定 MyBatis 如何自动映射 数据基表的列 NONE：不隐射 PARTIAL:部分 FULL:全部 --&amp;gt;
		&amp;lt;setting name=&amp;quot;autoMappingBehavior&amp;quot; value=&amp;quot;PARTIAL&amp;quot; /&amp;gt;

		&amp;lt;!-- 这是默认的执行类型 （SIMPLE: 简单； REUSE: 执行器可能重复使用prepared statements语句；BATCH: 
			执行器可以重复执行语句和批量更新） --&amp;gt;
		&amp;lt;setting name=&amp;quot;defaultExecutorType&amp;quot; value=&amp;quot;SIMPLE&amp;quot; /&amp;gt;

		&amp;lt;!-- 使用驼峰命名法转换字段。 --&amp;gt;
		&amp;lt;setting name=&amp;quot;mapUnderscoreToCamelCase&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;

		&amp;lt;!-- 设置本地缓存范围 session:就会有数据的共享 statement:语句范围 (这样就不会有数据的共享 ) defalut:session --&amp;gt;
		&amp;lt;setting name=&amp;quot;localCacheScope&amp;quot; value=&amp;quot;SESSION&amp;quot; /&amp;gt;

		&amp;lt;!-- 设置但JDBC类型为空时,某些驱动程序 要指定值,default:OTHER，插入空值时不需要指定类型 --&amp;gt;
		&amp;lt;setting name=&amp;quot;jdbcTypeForNull&amp;quot; value=&amp;quot;NULL&amp;quot; /&amp;gt;
		&amp;lt;setting name=&amp;quot;callSettersOnNulls&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;
		&amp;lt;!-- 显示sql日志 --&amp;gt;
		&amp;lt;!--&amp;lt;setting name=&amp;quot;logImpl&amp;quot; value=&amp;quot;STDOUT_LOGGING&amp;quot; /&amp;gt;--&amp;gt;

	&amp;lt;/settings&amp;gt;
	
&amp;lt;/configuration&amp;gt;
&lt;/code&gt;&lt;/pre&gt;

  // var escape = "[{&#34;content&#34;:&#34;&lt;h1 id=\&#34;链路相关环境\&#34;&gt;链路相关环境&lt;/h1&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-text\&#34;&gt;测试环境（资源有限）\nKibana: http://10.106.0.138/redirect 域账号登陆\nKafka: 10.1.12.202 s202、10.1.12.203 s203、10.1.12.204 s204 调试通用topic:CommunalLogs,其他topic需要提前申请，并配置日志消费\nhttp接口：10.106.0.138:8083/logstorage\n查询接口：10.106.0.138:8085/logserver\nFlumeServer：10.106.0.138:5151\n\n开发环境\nKafka\nKibana: http://10.1.12.78/redirect 域账号登陆\nKafka: 10.1.12.146 dev146、10.1.12.147 dev147、10.1.12.50 dev50 调试通用topic:CommunalLogs,其他topic需要配置日志消费\nhttp接口：10.1.12.114:8083/logstorage\n查询接口：10.1.12.114:8085/logserver\nFlumeServer：10.1.12.78:5151\n\nSkywalkingWEB：http://10.1.12.114:8080/\n\nSkywalking采集：10.1.12.114:12800/11800\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;ju-yuan-ji&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;聚源记录&#34;,&#34;tags&#34;:[],&#34;date&#34;:&#34;2021-06-04 15:14:28&#34;,&#34;dateFormat&#34;:&#34;2021-06-04&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/ju-yuan-ji/&#34;,&#34;hideInList&#34;:true,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:54000,&#34;words&#34;:180,&#34;minutes&#34;:1},&#34;description&#34;:&#34;链路相关环境\n测试环境（资源有限）\nKibana: http://10.106.0.138/redirect 域账号登陆\nKafka: 10.1.12.202 s202、10.1.12.203 s203、10.1.12.204 s204 调...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E9%93%BE%E8%B7%AF%E7%9B%B8%E5%85%B3%E7%8E%AF%E5%A2%83\&#34;&gt;链路相关环境&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h2 id=\&#34;20210531~20210604\&#34;&gt;2021.05.31~2021.06.04&lt;/h2&gt;\n&lt;h4 id=\&#34;本周完成工作\&#34;&gt;本周完成工作:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;全平台全时间轴链路查询接口及自测&lt;/li&gt;\n&lt;li&gt;单个平台链路查询接口及自测&lt;/li&gt;\n&lt;li&gt;平台链路分组列表及自测&lt;/li&gt;\n&lt;li&gt;使用策略模式优化，将不同的查询方法（资源id查询，平台查询）分为不同的策略&lt;/li&gt;\n&lt;li&gt;使用StringTemplate优化ES查询参数构建复杂的问题&lt;/li&gt;\n&lt;li&gt;链路评审会议，确定需求细节及埋点字段&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;本周工作总结\&#34;&gt;本周工作总结:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;链路相关需求讨论，接口开发与自测&lt;/li&gt;\n&lt;li&gt;由于埋点数据未齐全，查询不到链路数据&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;下周工作计划\&#34;&gt;下周工作计划:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;代码认证通过，并申请git账号&lt;/li&gt;\n&lt;li&gt;了解JUNO项目相关业务&lt;/li&gt;\n&lt;li&gt;链路查询接口继续跟进&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&#34;20210524~20210528\&#34;&gt;2021.05.24~2021.05.28&lt;/h2&gt;\n&lt;h4 id=\&#34;本周完成工作-2\&#34;&gt;本周完成工作:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;新员工编码考试&lt;/li&gt;\n&lt;li&gt;ES学习，包括ES原理及常用操作（简单查询，搜索查询，聚合查询等）并通过Kibana查询ES数据&lt;/li&gt;\n&lt;li&gt;链路分析平台客户端查询项目搭建&lt;/li&gt;\n&lt;li&gt;链路分析平台原型评审，包括埋点及页面功能的讨论&lt;/li&gt;\n&lt;li&gt;链路分析查询逻辑梳理，链路查询接口编写&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;本周工作总结-2\&#34;&gt;本周工作总结:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;完成新员工编码考试，并搭建上岗测试项目&lt;/li&gt;\n&lt;li&gt;链路分析平台原型评审&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;下周工作计划-2\&#34;&gt;下周工作计划:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;链路分析查询接口完善&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h2 id=\&#34;20210517~20210521\&#34;&gt;2021.05.17~2021.05.21&lt;/h2&gt;\n&lt;h4 id=\&#34;本周完成工作-3\&#34;&gt;本周完成工作:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;新员工入职手续办理，开发工具及开发环境安装&lt;/li&gt;\n&lt;li&gt;阅读 Confluence 知识库中涉及到项目相关的资料&lt;/li&gt;\n&lt;li&gt;学习 Sharding Sphere 并查看任务平台代码相关配置&lt;/li&gt;\n&lt;li&gt;学习 Kafka，编写测试 demo&lt;/li&gt;\n&lt;li&gt;研读任务平台代码，协助部署任务平台，发现脚本运行错误&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;本周工作总结-3\&#34;&gt;本周工作总结:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;入职环境配置&lt;/li&gt;\n&lt;li&gt;项目资料学习&lt;/li&gt;\n&lt;/ol&gt;\n&lt;h4 id=\&#34;下周工作计划-3\&#34;&gt;下周工作计划:&lt;/h4&gt;\n&lt;ol&gt;\n&lt;li&gt;上岗考试准备&lt;/li&gt;\n&lt;li&gt;参与项目培训，深入了解项目&lt;/li&gt;\n&lt;/ol&gt;\n&#34;,&#34;fileName&#34;:&#34;ju-yuan-ji-lu&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;聚源周报&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;工作记录&#34;,&#34;slug&#34;:&#34;NmultAXjD&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/NmultAXjD/&#34;}],&#34;date&#34;:&#34;2021-06-04 08:43:03&#34;,&#34;dateFormat&#34;:&#34;2021-06-04&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/ju-yuan-ji-lu/&#34;,&#34;hideInList&#34;:true,&#34;isTop&#34;:true,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:103000,&#34;words&#34;:490,&#34;minutes&#34;:2},&#34;description&#34;:&#34;2021.05.31~2021.06.04\n本周完成工作:\n\n全平台全时间轴链路查询接口及自测\n单个平台链路查询接口及自测\n平台链路分组列表及自测\n使用策略模式优化，将不同的查询方法（资源id查询，平台查询）分为不同的策略\n使用String...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#20210531~20210604\&#34;&gt;2021.05.31~2021.06.04&lt;/a&gt;&lt;br&gt;\n*\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%AE%8C%E6%88%90%E5%B7%A5%E4%BD%9C\&#34;&gt;本周完成工作:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%B7%A5%E4%BD%9C%E6%80%BB%E7%BB%93\&#34;&gt;本周工作总结:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E5%91%A8%E5%B7%A5%E4%BD%9C%E8%AE%A1%E5%88%92\&#34;&gt;下周工作计划:&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#20210524~20210528\&#34;&gt;2021.05.24~2021.05.28&lt;/a&gt;&lt;br&gt;\n*\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%AE%8C%E6%88%90%E5%B7%A5%E4%BD%9C-2\&#34;&gt;本周完成工作:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%B7%A5%E4%BD%9C%E6%80%BB%E7%BB%93-2\&#34;&gt;本周工作总结:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E5%91%A8%E5%B7%A5%E4%BD%9C%E8%AE%A1%E5%88%92-2\&#34;&gt;下周工作计划:&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#20210517~20210521\&#34;&gt;2021.05.17~2021.05.21&lt;/a&gt;&lt;br&gt;\n*\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%AE%8C%E6%88%90%E5%B7%A5%E4%BD%9C-3\&#34;&gt;本周完成工作:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E6%9C%AC%E5%91%A8%E5%B7%A5%E4%BD%9C%E6%80%BB%E7%BB%93-3\&#34;&gt;本周工作总结:&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%8B%E5%91%A8%E5%B7%A5%E4%BD%9C%E8%AE%A1%E5%88%92-3\&#34;&gt;下周工作计划:&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;在微服务的开发过程中，注册中心是一个非常重要的角色，它可以帮助我们发现其他的服务。注册中心也有很多种类，下面主要介绍一下我使用过的 Consul。&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;h2 id=\&#34;一-为什么选择consul\&#34;&gt;一、为什么选择consul&lt;/h2&gt;\n&lt;p&gt;我们知道 Eureka 2.X 遇到困难停止开发了，但其实对国内的用户影响甚小，一方面国内大都使用的是 Eureka 1.X 系列，另一方面 Spring Cloud 支持很多服务发现的软件，Eureka 只是其中之一，下面是 Spring Cloud 支持的服务发现软件以及特性对比：&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://imgs.cxlsky.com/image1560846242657.jpg\&#34; alt=\&#34;registry.jpg\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;在以上服务发现的软件中，Euerka 和 Consul 使用最为广泛。但由于eureka已经停止更新，所以这里选用consul。&lt;/p&gt;\n&lt;h2 id=\&#34;二-consul介绍\&#34;&gt;二、Consul介绍&lt;/h2&gt;\n&lt;p&gt;Consul 是 HashiCorp 公司推出的开源工具，用于实现分布式系统的服务发现与配置。与其它分布式服务注册与发现的方案，Consul 的方案更“一站式”，内置了服务注册与发现框 架、分布一致性协议实现、健康检查、Key/Value 存储、多数据中心方案，不再需要依赖其它工具（比如 ZooKeeper 等）。使用起来也较 为简单。Consul 使用 Go 语言编写，因此具有天然可移植性(支持Linux、windows和Mac OS X)；安装包仅包含一个可执行文件，方便部署，与 Docker 等轻量级容器可无缝配合。&lt;/p&gt;\n&lt;h3 id=\&#34;21-consul优势\&#34;&gt;2.1 consul优势&lt;/h3&gt;\n&lt;p&gt;1、使用 Raft 算法来保证一致性, 比复杂的 Paxos 算法更直接. 相比较而言, zookeeper 采用的是 Paxos, 而 etcd 使用的则是 Raft。&lt;br&gt;\n2、支持多数据中心，内外网的服务采用不同的端口进行监听。 多数据中心集群可以避免单数据中心的单点故障,而其部署则需要考虑网络延迟, 分片等情况等。 zookeeper 和 etcd 均不提供多数据中心功能的支持。&lt;br&gt;\n3、支持健康检查。 etcd 不提供此功能。&lt;br&gt;\n4、支持 http 和 dns 协议接口。 zookeeper 的集成较为复杂, etcd 只支持 http 协议。&lt;br&gt;\n5、官方提供 web 管理界面, etcd 无此功能。&lt;br&gt;\n6、综合比较, Consul 作为服务注册和配置管理的新星, 比较值得关注和研究。&lt;/p&gt;\n&lt;h3 id=\&#34;22-consul角色\&#34;&gt;2.2 Consul角色&lt;/h3&gt;\n&lt;p&gt;1、client: 客户端, 无状态, 将 HTTP 和 DNS 接口请求转发给局域网内的服务端集群。&lt;br&gt;\n2、server: 服务端, 保存配置信息, 高可用集群, 在局域网内与本地客户端通讯, 通过广域网与其它数据中心通讯。 每个数据中心的 server 数量推荐为 3 个或是 5 个。&lt;/p&gt;\n&lt;p&gt;Consul 客户端、服务端还支持夸中心的使用，更加提高了它的高可用性。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;2\&#34;&gt;&lt;img src=\&#34;https://imgs.cxlsky.com/image1560846818889.jpg\&#34; alt=\&#34;consul.jpg\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h3 id=\&#34;23-consul工作原理\&#34;&gt;2.3 Consul工作原理&lt;/h3&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;3\&#34;&gt;&lt;img src=\&#34;https://imgs.cxlsky.com/image1560846871580.jpg\&#34; alt=\&#34;consul1.jpg\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;1、当 Producer 启动的时候，会向 Consul 发送一个 post 请求，告诉 Consul 自己的 IP 和 Port&lt;br&gt;\n2、Consul 接收到 Producer 的注册后，每隔10s（默认）会向 Producer 发送一个健康检查的请求，检验Producer是否健康&lt;br&gt;\n3、当 Consumer 发送 GET 方式请求 /api/address 到 Producer 时，会先从 Consul 中拿到一个存储服务 IP 和 Port 的临时表，从表中拿到 Producer 的 IP 和 Port 后再发送 GET 方式请求 /api/address&lt;br&gt;\n4、该临时表每隔10s会更新，只包含有通过了健康检查的 Producer&lt;/p&gt;\n&lt;p&gt;Spring Cloud Consul 项目是针对 Consul 的服务治理实现。Consul 是一个分布式高可用的系统，它包含多个组件，但是作为一个整体，在微服务架构中为我们的基础设施提供服务发现和服务配置的工具。&lt;/p&gt;\n&lt;h2 id=\&#34;三-springcloud项目整合consul\&#34;&gt;三、SpringCloud项目整合Consul&lt;/h2&gt;\n&lt;h3 id=\&#34;31-准备工作\&#34;&gt;3.1 准备工作&lt;/h3&gt;\n&lt;p&gt;在之前的父工程项目中，新建一个子模块service-a，引入以下主要依赖：(其他依赖可自行添加)&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;&amp;lt;dependency&amp;gt;\n\t\t&amp;lt;groupId&amp;gt;org.springframework.boot&amp;lt;/groupId&amp;gt;\n\t\t&amp;lt;artifactId&amp;gt;spring-boot-starter-actuator&amp;lt;/artifactId&amp;gt;\n\t&amp;lt;/dependency&amp;gt;\n\t&amp;lt;dependency&amp;gt;\n\t\t&amp;lt;groupId&amp;gt;org.springframework.cloud&amp;lt;/groupId&amp;gt;\n\t\t&amp;lt;artifactId&amp;gt;spring-cloud-starter-consul-discovery&amp;lt;/artifactId&amp;gt;\n\t&amp;lt;/dependency&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;其中spring-boot-starter-actuator依赖用户健康检查，如果不加这个依赖，可以自定义健康检查。&lt;br&gt;\n其中spring-cloud-starter-consul-discovery是consul的依赖。&lt;/p&gt;\n&lt;h3 id=\&#34;32-修改配置文件\&#34;&gt;3.2 修改配置文件&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yaml\&#34;&gt;#连接注册中心\nspring:\n  cloud:\n    consul:\n      #注册中心的地址，使用${}的形式，如果冒号前面的值为空，则取后面的值。\n      host: ${DS_SERVER:192.168.132.131} \n      port: 8500\n      discovery:\n        instance-id: ${spring.application.name}-${random.uuid}\n\n#此配置用于健康检查\nmanagement:\n  endpoints:\n    web:\n      exposure:\n        include: &amp;quot;*&amp;quot;\n  endpoint:\n    health:\n      show-details: always\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;33-修改springboot入口类增加注解enablediscoveryclient\&#34;&gt;3.3 修改springboot入口类，增加注解&lt;code&gt;@EnableDiscoveryClient&lt;/code&gt;&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;@EnableDiscoveryClient\n@SpringBootApplication(scanBasePackages = &amp;quot;com.cxlsky&amp;quot;)\n@EnableFeignClients(basePackages={&amp;quot;com.cxlsky&amp;quot;})\npublic class EurekaClientAApplication {\n\n    public static void main(String[] args) {\n        SpringApplication.run(EurekaClientAApplication.class, args);\n    }\n\n}\n&lt;/code&gt;&lt;/pre&gt;\n&lt;p&gt;这样我们spring项目就改造完成了。&lt;/p&gt;\n&lt;h2 id=\&#34;四-consul服务端的安装\&#34;&gt;四、Consul服务端的安装&lt;/h2&gt;\n&lt;h3 id=\&#34;41-这里使用docker安装单节点consul\&#34;&gt;4.1 这里使用docker安装单节点consul：&lt;/h3&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-bash\&#34;&gt;## 1、搜索镜像\ndocker search consul\n## 2、拉取镜像\ndocker pull consul\n## 3、运行镜像\ndocker run -d -p 18500:8500 --name consul-server consul agent -server -bootstrap -client 0.0.0.0 -ui\n## 4、查看运行日志\ndocker logs -f  consul-server\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h3 id=\&#34;42-查看web页面\&#34;&gt;4.2 查看web页面&lt;/h3&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;4\&#34;&gt;&lt;img src=\&#34;https://imgs.cxlsky.com/image1560850783917.jpg\&#34; alt=\&#34;consulweb.jpg\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;可以看到现在只有consul自己一个服务注册上去了，下面我们启动我们的项目。&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;5\&#34;&gt;&lt;img src=\&#34;https://imgs.cxlsky.com/image1560851191684.jpg\&#34; alt=\&#34;consulclient.jpg\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;p&gt;可以看到上面多出了我们的服务，这样就完成了服务发现。&lt;/p&gt;\n&lt;blockquote&gt;\n&lt;p&gt;由于注册中心的重要性，我们需要做高可用，所以需要集群部署。后续的章节中我会讲解以下docker swarm，并且使用docker swarm快速完成consul的集群部署。&lt;/p&gt;\n&lt;/blockquote&gt;\n&#34;,&#34;fileName&#34;:&#34;注册中心Consul&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;在微服务的开发过程中，注册中心是一个非常重要的角色，它可以帮助我们发现其他的服务。注册中心也有很多种类，下面主要介绍一下我使用过的 Consul。&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;注册中心Consul&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;微服务&#34;,&#34;slug&#34;:&#34;SdB7sp6aNF&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/SdB7sp6aNF/&#34;},{&#34;name&#34;:&#34;注册中心&#34;,&#34;slug&#34;:&#34;aoNDPBEoVc&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/aoNDPBEoVc/&#34;},{&#34;name&#34;:&#34;JAVA&#34;,&#34;slug&#34;:&#34;4aTHC093mM&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/4aTHC093mM/&#34;}],&#34;date&#34;:&#34;2020-02-11 13:17:08&#34;,&#34;dateFormat&#34;:&#34;2020-02-11&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/注册中心Consul/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;6 min read&#34;,&#34;time&#34;:327000,&#34;words&#34;:1388,&#34;minutes&#34;:6},&#34;description&#34;:&#34;在微服务的开发过程中，注册中心是一个非常重要的角色，它可以帮助我们发现其他的服务。注册中心也有很多种类，下面主要介绍一下我使用过的 Consul。\n\n一、为什么选择consul\n我们知道 Eureka 2.X 遇到困难停止开发了，但其实对国...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%80-%E4%B8%BA%E4%BB%80%E4%B9%88%E9%80%89%E6%8B%A9consul\&#34;&gt;一、为什么选择consul&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BA%8C-consul%E4%BB%8B%E7%BB%8D\&#34;&gt;二、Consul介绍&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#21-consul%E4%BC%98%E5%8A%BF\&#34;&gt;2.1 consul优势&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#22-consul%E8%A7%92%E8%89%B2\&#34;&gt;2.2 Consul角色&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#23-consul%E5%B7%A5%E4%BD%9C%E5%8E%9F%E7%90%86\&#34;&gt;2.3 Consul工作原理&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%89-springcloud%E9%A1%B9%E7%9B%AE%E6%95%B4%E5%90%88consul\&#34;&gt;三、SpringCloud项目整合Consul&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#31-%E5%87%86%E5%A4%87%E5%B7%A5%E4%BD%9C\&#34;&gt;3.1 准备工作&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#32-%E4%BF%AE%E6%94%B9%E9%85%8D%E7%BD%AE%E6%96%87%E4%BB%B6\&#34;&gt;3.2 修改配置文件&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#33-%E4%BF%AE%E6%94%B9springboot%E5%85%A5%E5%8F%A3%E7%B1%BB%E5%A2%9E%E5%8A%A0%E6%B3%A8%E8%A7%A3enablediscoveryclient\&#34;&gt;3.3 修改springboot入口类，增加注解&lt;code&gt;@EnableDiscoveryClient&lt;/code&gt;&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E5%9B%9B-consul%E6%9C%8D%E5%8A%A1%E7%AB%AF%E7%9A%84%E5%AE%89%E8%A3%85\&#34;&gt;四、Consul服务端的安装&lt;/a&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#41-%E8%BF%99%E9%87%8C%E4%BD%BF%E7%94%A8docker%E5%AE%89%E8%A3%85%E5%8D%95%E8%8A%82%E7%82%B9consul\&#34;&gt;4.1 这里使用docker安装单节点consul：&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#42-%E6%9F%A5%E7%9C%8Bweb%E9%A1%B5%E9%9D%A2\&#34;&gt;4.2 查看web页面&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;👏  欢迎使用 &lt;strong&gt;Gridea&lt;/strong&gt; ！&lt;br&gt;\n✍️  &lt;strong&gt;Gridea&lt;/strong&gt; 一个静态博客写作客户端。你可以用它来记录你的生活、心情、知识、笔记、创意... ...&lt;/p&gt;\n&lt;!-- more --&gt;\n&lt;p&gt;&lt;a href=\&#34;https://github.com/getgridea/gridea\&#34;&gt;Github&lt;/a&gt;&lt;br&gt;\n&lt;a href=\&#34;https://gridea.dev/\&#34;&gt;Gridea 主页&lt;/a&gt;&lt;br&gt;\n&lt;a href=\&#34;http://fehey.com/\&#34;&gt;示例网站&lt;/a&gt;&lt;/p&gt;\n&lt;figure data-type=\&#34;image\&#34; tabindex=\&#34;1\&#34;&gt;&lt;img src=\&#34;https://www.cxlsky.com/post-images/1622708559365.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&lt;/figure&gt;\n&lt;h2 id=\&#34;特性\&#34;&gt;特性👇&lt;/h2&gt;\n&lt;p&gt;📝  你可以使用最酷的 &lt;strong&gt;Markdown&lt;/strong&gt; 语法，进行快速创作&lt;/p&gt;\n&lt;p&gt;🌉  你可以给文章配上精美的封面图和在文章任意位置插入图片&lt;/p&gt;\n&lt;p&gt;🏷️  你可以对文章进行标签分组&lt;/p&gt;\n&lt;p&gt;📋  你可以自定义菜单，甚至可以创建外部链接菜单&lt;/p&gt;\n&lt;p&gt;💻  你可以在 &lt;strong&gt;Windows&lt;/strong&gt;，&lt;strong&gt;MacOS&lt;/strong&gt; 或 &lt;strong&gt;Linux&lt;/strong&gt; 设备上使用此客户端&lt;/p&gt;\n&lt;p&gt;🌎  你可以使用 &lt;strong&gt;𝖦𝗂𝗍𝗁𝗎𝖻 𝖯𝖺𝗀𝖾𝗌&lt;/strong&gt; 或 &lt;strong&gt;Coding Pages&lt;/strong&gt; 向世界展示，未来将支持更多平台&lt;/p&gt;\n&lt;p&gt;💬  你可以进行简单的配置，接入 &lt;a href=\&#34;https://github.com/gitalk/gitalk\&#34;&gt;Gitalk&lt;/a&gt; 或 &lt;a href=\&#34;https://github.com/SukkaW/DisqusJS\&#34;&gt;DisqusJS&lt;/a&gt; 评论系统&lt;/p&gt;\n&lt;p&gt;🇬🇧  你可以使用&lt;strong&gt;中文简体&lt;/strong&gt;或&lt;strong&gt;英语&lt;/strong&gt;&lt;/p&gt;\n&lt;p&gt;🌁  你可以任意使用应用内默认主题或任意第三方主题，强大的主题自定义能力&lt;/p&gt;\n&lt;p&gt;🖥  你可以自定义源文件夹，利用 OneDrive、百度网盘、iCloud、Dropbox 等进行多设备同步&lt;/p&gt;\n&lt;p&gt;🌱 当然 &lt;strong&gt;Gridea&lt;/strong&gt; 还很年轻，有很多不足，但请相信，它会不停向前 🏃&lt;/p&gt;\n&lt;p&gt;未来，它一定会成为你离不开的伙伴&lt;/p&gt;\n&lt;p&gt;尽情发挥你的才华吧！&lt;/p&gt;\n&lt;p&gt;😘 Enjoy~&lt;/p&gt;\n&#34;,&#34;fileName&#34;:&#34;hello-gridea&#34;,&#34;abstract&#34;:&#34;&lt;p&gt;👏  欢迎使用 &lt;strong&gt;Gridea&lt;/strong&gt; ！&lt;br&gt;\n✍️  &lt;strong&gt;Gridea&lt;/strong&gt; 一个静态博客写作客户端。你可以用它来记录你的生活、心情、知识、笔记、创意... ...&lt;/p&gt;\n&#34;,&#34;title&#34;:&#34;Hello Gridea&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;Gridea&#34;,&#34;slug&#34;:&#34;Za-Zj2gGl&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/Za-Zj2gGl/&#34;}],&#34;date&#34;:&#34;2018-12-12 00:00:00&#34;,&#34;dateFormat&#34;:&#34;2018-12-12&#34;,&#34;feature&#34;:&#34;https://www.cxlsky.com/post-images/hello-gridea.png&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/hello-gridea/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;2 min read&#34;,&#34;time&#34;:62000,&#34;words&#34;:298,&#34;minutes&#34;:2},&#34;description&#34;:&#34;👏  欢迎使用 Gridea ！\n✍️  Gridea 一个静态博客写作客户端。你可以用它来记录你的生活、心情、知识、笔记、创意... ...\n\nGithub\nGridea 主页\n示例网站\n\n特性👇\n📝  你可以使用最酷的 Markd...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E7%89%B9%E6%80%A7\&#34;&gt;特性👇&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h2 id=\&#34;1在git下载seata\&#34;&gt;1.在git下载seata&lt;/h2&gt;\n&lt;p&gt;地址：&lt;a href=\&#34;http://121.5.101.66:8882/city-management/seata.git\&#34;&gt;http://121.5.101.66:8882/city-management/seata.git&lt;/a&gt;&lt;/p&gt;\n&lt;h2 id=\&#34;2启动seata\&#34;&gt;2.启动:seata&lt;/h2&gt;\n&lt;p&gt;在seata文件夹中的bin有启动脚本 启动就行&lt;/p&gt;\n&lt;h2 id=\&#34;3加入依赖\&#34;&gt;3.加入依赖&lt;/h2&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;&amp;lt;dependency&amp;gt;\n    &amp;lt;groupId&amp;gt;com.alibaba.cloud&amp;lt;/groupId&amp;gt;\n    &amp;lt;artifactId&amp;gt;spring-cloud-starter-alibaba-seata&amp;lt;/artifactId&amp;gt;\n&amp;lt;/dependency&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;4在需要远程事务的地方加载注解\&#34;&gt;4.在需要远程事务的地方加载注解&lt;/h2&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-java\&#34;&gt;@GlobalTransactional\n@Override\npublic void testT() {\n    Test1DO aDo = new Test1DO();\n    aDo.setName(&amp;quot;123&amp;quot;);\n    this.save(aDo);\n    Test2DTO dto = new Test2DTO();\n    dto.setName(aDo.getName());\n    test2Client.add(dto);\n}\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;远程事务使用说明&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;远程事务配置&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;微服务&#34;,&#34;slug&#34;:&#34;SdB7sp6aNF&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/SdB7sp6aNF/&#34;},{&#34;name&#34;:&#34;JAVA&#34;,&#34;slug&#34;:&#34;4aTHC093mM&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/4aTHC093mM/&#34;},{&#34;name&#34;:&#34;Mybatis&#34;,&#34;slug&#34;:&#34;M8V8EHYlKn&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/M8V8EHYlKn/&#34;}],&#34;date&#34;:&#34;2018-03-11 09:12:04&#34;,&#34;dateFormat&#34;:&#34;2018-03-11&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/远程事务使用说明/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;1 min read&#34;,&#34;time&#34;:34000,&#34;words&#34;:111,&#34;minutes&#34;:1},&#34;description&#34;:&#34;1.在git下载seata\n地址：http://121.5.101.66:8882/city-management/seata.git\n2.启动:seata\n在seata文件夹中的bin有启动脚本 启动就行\n3.加入依赖\n&amp;lt;depen...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#1%E5%9C%A8git%E4%B8%8B%E8%BD%BDseata\&#34;&gt;1.在git下载seata&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#2%E5%90%AF%E5%8A%A8seata\&#34;&gt;2.启动:seata&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#3%E5%8A%A0%E5%85%A5%E4%BE%9D%E8%B5%96\&#34;&gt;3.加入依赖&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#4%E5%9C%A8%E9%9C%80%E8%A6%81%E8%BF%9C%E7%A8%8B%E4%BA%8B%E5%8A%A1%E7%9A%84%E5%9C%B0%E6%96%B9%E5%8A%A0%E8%BD%BD%E6%B3%A8%E8%A7%A3\&#34;&gt;4.在需要远程事务的地方加载注解&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;h2 id=\&#34;一-mybatis-configxml配置\&#34;&gt;一、mybatis-config.xml配置&lt;/h2&gt;\n&lt;p&gt;由于开发新项目，需要对mybatis做配置，这些配置可以放在系统的yml文件里，也可以单独放在一个xml文件里，本示例放到了单独文件，如下所示：&lt;/p&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-xml\&#34;&gt;&amp;lt;?xml version=&amp;quot;1.0&amp;quot; encoding=&amp;quot;UTF-8&amp;quot;?&amp;gt;\n&amp;lt;!DOCTYPE configuration PUBLIC &amp;quot;-//mybatis.org//DTD Config 3.0//EN&amp;quot; &amp;quot;http://mybatis.org/dtd/mybatis-3-config.dtd&amp;quot;&amp;gt;\n&amp;lt;configuration&amp;gt;\n\n\t&amp;lt;!-- 全局参数 --&amp;gt;\n\t&amp;lt;settings&amp;gt;\n\t\t&amp;lt;!-- 使全局的映射器启用或禁用缓存。 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;cacheEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 全局启用或禁用延迟加载。当禁用时，所有关联对象都会即时加载。 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;lazyLoadingEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 当启用时，有延迟加载属性的对象在被调用时将会完全加载任意属性。否则，每种属性将会按需要加载。 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;aggressiveLazyLoading&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 是否允许单条sql 返回多个数据集 (取决于驱动的兼容性) default:true --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;multipleResultSetsEnabled&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 是否可以使用列的别名 (取决于驱动的兼容性) default:true --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;useColumnLabel&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 允许JDBC 生成主键。需要驱动器支持。如果设为了true，这个设置将强制使用被生成的主键，有一些驱动器不兼容不过仍然可以执行。 default:false --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;useGeneratedKeys&amp;quot; value=&amp;quot;false&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 指定 MyBatis 如何自动映射 数据基表的列 NONE：不隐射 PARTIAL:部分 FULL:全部 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;autoMappingBehavior&amp;quot; value=&amp;quot;PARTIAL&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 这是默认的执行类型 （SIMPLE: 简单； REUSE: 执行器可能重复使用prepared statements语句；BATCH: \n\t\t\t执行器可以重复执行语句和批量更新） --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;defaultExecutorType&amp;quot; value=&amp;quot;SIMPLE&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 使用驼峰命名法转换字段。 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;mapUnderscoreToCamelCase&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 设置本地缓存范围 session:就会有数据的共享 statement:语句范围 (这样就不会有数据的共享 ) defalut:session --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;localCacheScope&amp;quot; value=&amp;quot;SESSION&amp;quot; /&amp;gt;\n\n\t\t&amp;lt;!-- 设置但JDBC类型为空时,某些驱动程序 要指定值,default:OTHER，插入空值时不需要指定类型 --&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;jdbcTypeForNull&amp;quot; value=&amp;quot;NULL&amp;quot; /&amp;gt;\n\t\t&amp;lt;setting name=&amp;quot;callSettersOnNulls&amp;quot; value=&amp;quot;true&amp;quot; /&amp;gt;\n\t\t&amp;lt;!-- 显示sql日志 --&amp;gt;\n\t\t&amp;lt;!--&amp;lt;setting name=&amp;quot;logImpl&amp;quot; value=&amp;quot;STDOUT_LOGGING&amp;quot; /&amp;gt;--&amp;gt;\n\n\t&amp;lt;/settings&amp;gt;\n\t\n&amp;lt;/configuration&amp;gt;\n&lt;/code&gt;&lt;/pre&gt;\n&lt;h2 id=\&#34;二-系统-applicationyml-配置\&#34;&gt;二、系统 application.yml 配置&lt;/h2&gt;\n&lt;pre&gt;&lt;code class=\&#34;language-yaml\&#34;&gt;mybatis-plus:\n  config-location: classpath:mybatis/mybatis-config.xml\n  mapper-locations: classpath*:mapper/*.xml\n&lt;/code&gt;&lt;/pre&gt;\n&#34;,&#34;fileName&#34;:&#34;mybatis常规配置&#34;,&#34;abstract&#34;:&#34;&#34;,&#34;title&#34;:&#34;Mybatis常规配置&#34;,&#34;tags&#34;:[{&#34;name&#34;:&#34;JAVA&#34;,&#34;slug&#34;:&#34;4aTHC093mM&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/4aTHC093mM/&#34;},{&#34;name&#34;:&#34;Mybatis&#34;,&#34;slug&#34;:&#34;M8V8EHYlKn&#34;,&#34;used&#34;:true,&#34;link&#34;:&#34;https://www.cxlsky.com/tag/M8V8EHYlKn/&#34;}],&#34;date&#34;:&#34;2018-02-11 09:12:04&#34;,&#34;dateFormat&#34;:&#34;2018-02-11&#34;,&#34;feature&#34;:&#34;&#34;,&#34;link&#34;:&#34;https://www.cxlsky.com/post/mybatis常规配置/&#34;,&#34;hideInList&#34;:false,&#34;isTop&#34;:false,&#34;stats&#34;:{&#34;text&#34;:&#34;3 min read&#34;,&#34;time&#34;:175000,&#34;words&#34;:642,&#34;minutes&#34;:3},&#34;description&#34;:&#34;一、mybatis-config.xml配置\n由于开发新项目，需要对mybatis做配置，这些配置可以放在系统的yml文件里，也可以单独放在一个xml文件里，本示例放到了单独文件，如下所示：\n&amp;lt;?xml version=&amp;quot;1...&#34;,&#34;toc&#34;:&#34;&lt;ul class=\&#34;markdownIt-TOC\&#34;&gt;\n&lt;li&gt;\n&lt;ul&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%B8%80-mybatis-configxml%E9%85%8D%E7%BD%AE\&#34;&gt;一、mybatis-config.xml配置&lt;/a&gt;&lt;/li&gt;\n&lt;li&gt;&lt;a href=\&#34;#%E4%BA%8C-%E7%B3%BB%E7%BB%9F-applicationyml-%E9%85%8D%E7%BD%AE\&#34;&gt;二、系统 application.yml 配置&lt;/a&gt;&lt;/li&gt;\n&lt;/ul&gt;\n&lt;/li&gt;\n&lt;/ul&gt;\n&#34;},{&#34;content&#34;:&#34;&lt;p&gt;&lt;img src=\&#34;https://www.cxlsky.com/post-images/1622706832788.png\&#34; alt=\&#34;\&#34; loading=\&#34;lazy\&#34;&gt;&amp;gt; 欢迎来到我的小站呀，很高兴遇见你！🤝&lt;/p&gt;\n&lt;h2 id=\&#34;关于本站\&#34;&gt;🏠 关于本站&lt;/h2&gt;\n&lt;h2 id=\&#34;博主是谁\&#34;&gt;👨‍💻 博主是谁&lt;/h2&gt;
